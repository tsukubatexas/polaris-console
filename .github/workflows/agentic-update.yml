name: agentic update

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AGENT_MAX_ROUNDS: "3"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_REPAIR_MODEL: ${{ vars.OPENAI_REPAIR_MODEL || 'gpt-5.2' }}
      POLARIS_RELEASE: latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run agentic OpenAPI update loop
        run: scripts/agentic_update_loop.sh
      - name: Create update PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: agentic/polaris-openapi-update
          delete-branch: true
          title: "feat: update Apache Polaris operation surface"
          commit-message: "feat: update Apache Polaris operation surface"
          body: |
            Automated Polaris Console refresh.

            This PR updates generated OpenAPI operation metadata, frontend operation types, and any repair changes needed for the latest Apache Polaris release.
          labels: |
            agentic
            automated
