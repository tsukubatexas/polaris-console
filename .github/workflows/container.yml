name: container

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - Dockerfile
      - backend/**
      - frontend/**
      - pyproject.toml
      - README.md
      - .github/workflows/container.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Build and publish image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tags=(-t "$IMAGE:$SHA_TAG")
          if [[ "$REF_TYPE" == "branch" && "$REF_NAME" == "main" ]]; then
            tags+=(-t "$IMAGE:latest")
            tags+=(-t "$IMAGE:$version")
          fi
          if [[ "$REF_TYPE" == "tag" ]]; then
            version="${REF_NAME#v}"
            tags+=(-t "$IMAGE:$version")
          fi

          docker buildx create --name polaris-console-builder --use >/dev/null 2>&1 || docker buildx use polaris-console-builder
          docker buildx build --load "${tags[@]}" .
          scripts/container_smoke_test.sh "$IMAGE:$SHA_TAG"
          docker buildx build --push --sbom=true --provenance=true "${tags[@]}" .
