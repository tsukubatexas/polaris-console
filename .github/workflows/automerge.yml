name: automerge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr:
        description: "Pull request number"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  trusted-bot-automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enable auto-merge for trusted bot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          author="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')"
          title="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')"

          case "$author" in
            app/dependabot|dependabot[bot]|app/github-actions|github-actions[bot])
              ;;
            *)
              echo "PR #$PR_NUMBER is authored by $author; skipping."
              exit 0
              ;;
          esac

          case "$title" in
            chore\(deps\):*|chore\(deps-dev\):*|chore\(main\):\ release*)
              gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch
              ;;
            *)
              echo "PR #$PR_NUMBER title is not trusted automation: $title"
              ;;
          esac
