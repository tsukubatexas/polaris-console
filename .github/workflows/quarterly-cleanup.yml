name: quarterly cleanup

on:
  schedule:
    - cron: "29 5 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AGENT_MAX_ROUNDS: "3"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_REPAIR_MODEL: ${{ vars.OPENAI_REPAIR_MODEL || 'gpt-5.2' }}
      POLARIS_RELEASE: latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run cleanup loop
        run: scripts/quarterly_cleanup.sh
      - name: Create cleanup PR
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: agentic/quarterly-cleanup
          delete-branch: true
          title: "chore: quarterly Polaris Console cleanup"
          commit-message: "chore: quarterly Polaris Console cleanup"
          body: |
            Quarterly cleanup run for dependencies, generated Polaris API coverage, and repository hygiene.
          labels: |
            agentic
            maintenance
