{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "polaris-console.serviceAccountName" . }}
  labels:
    {{- include "polaris-console.labels" . | nindent 4 }}
  {{- $cloudAnnotations := include "polaris-console.cloudServiceAccountAnnotations" . | trim }}
  {{- if or .Values.serviceAccount.annotations $cloudAnnotations }}
  annotations:
{{- with .Values.serviceAccount.annotations }}
{{- toYaml . | nindent 4 }}
{{- end }}
{{- with $cloudAnnotations }}
{{- . | nindent 4 }}
{{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
