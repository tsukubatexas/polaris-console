{{- if .Values.namespace.create -}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace | quote }}
  labels:
    {{- include "polaris-console.labels" . | nindent 4 }}
    kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
    name: {{ .Release.Namespace | quote }}
    {{- with .Values.namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
