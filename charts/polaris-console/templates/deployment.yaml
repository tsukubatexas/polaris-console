apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "polaris-console.fullname" . }}
  labels:
    {{- include "polaris-console.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "polaris-console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "polaris-console.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with include "polaris-console.cloudPodLabels" . }}
        {{- . | nindent 8 }}
        {{- end }}
      {{- $cloudPodAnnotations := include "polaris-console.cloudPodAnnotations" . }}
      {{- if or .Values.podAnnotations $cloudPodAnnotations }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $cloudPodAnnotations }}
        {{- . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      serviceAccountName: {{ include "polaris-console.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: polaris-console
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: POLARIS_CONSOLE_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "polaris-console.secretName" . }}
                  key: {{ .Values.session.secretKey }}
            - name: POLARIS_CONSOLE_SESSION_TTL_SECONDS
              value: {{ .Values.session.ttlSeconds | quote }}
            - name: POLARIS_CONSOLE_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.config.requestTimeoutSeconds | quote }}
            - name: POLARIS_CONSOLE_COOKIE_SECURE
              value: {{ .Values.config.cookieSecure | quote }}
            - name: POLARIS_CONSOLE_ALLOW_INSECURE_TLS
              value: {{ .Values.config.allowInsecureTls | quote }}
            - name: POLARIS_CONSOLE_ALLOWED_ORIGINS
              value: {{ join "," .Values.config.allowedOrigins | quote }}
            - name: POLARIS_CONSOLE_ALLOWED_TARGET_HOSTS
              value: {{ join "," .Values.config.allowedTargetHosts | quote }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
