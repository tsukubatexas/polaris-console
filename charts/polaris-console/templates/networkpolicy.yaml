{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "polaris-console.fullname" . }}
  labels:
    {{- include "polaris-console.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "polaris-console.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingress.from }}
        {{- toYaml .Values.networkPolicy.ingress.from | nindent 8 }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: http
  egress:
    {{- if .Values.networkPolicy.egress.extraRules }}
    {{- toYaml .Values.networkPolicy.egress.extraRules | nindent 4 }}
    {{- else }}
    []
    {{- end }}
{{- end }}
