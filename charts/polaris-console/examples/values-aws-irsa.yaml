cloud:
  provider: aws
  aws:
    irsa:
      enabled: true
      roleArn: arn:aws:iam::123456789012:role/polaris-console-prod
      stsRegionalEndpoints: true
    podIdentity:
      enabled: false

config:
  allowedOrigins:
    - https://polaris-console.example.com
  allowedTargetHosts:
    - polaris.example.com
    - oidc.eks.eu-central-1.amazonaws.com
    - sts.eu-central-1.amazonaws.com

networkPolicy:
  enabled: true
  egress:
    extraRules:
      - to:
          - ipBlock:
              cidr: 10.0.0.0/8
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 8181
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53
